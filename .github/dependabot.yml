# GitHub Dependabot configuration (#1070 supply-chain quick-wins, parent #1069).
#
# Schedules weekly version + security update PRs for the three ecosystems
# the deft framework consumes:
#
#   - pip            -- the Python project at the repo root (`pyproject.toml`
#                       + `uv.lock` if present). uv-managed projects share the
#                       same `pip` dependency surface that dependabot
#                       understands, so this entry catches both the runtime
#                       deps and the dev tooling pinned in pyproject.
#   - gomod          -- the Go tool at `cmd/deft-install/` consumed via the
#                       repo-root `go.mod`. Go's transitive-import semantic
#                       means a single `go.mod` covers every Go binary in
#                       the workspace.
#   - github-actions -- the workflows at `.github/workflows/**`. Catches
#                       drift on `actions/checkout`, `actions/setup-python`,
#                       `actions/setup-go`, `astral-sh/setup-uv`, and
#                       `arduino/setup-task` (currently major-version
#                       tag-pinned; #1072 will SHA-pin these). Dependabot's
#                       `github-actions` ecosystem opens a PR when any of
#                       those bump, surfacing the upgrade path for #1072 in
#                       the meantime.
#
# `open-pull-requests-limit: 5` mirrors the GitHub default and bounds the
# weekly review load. Security advisories are not subject to this cap
# (dependabot opens those regardless per upstream policy).
#
# Companion supply-chain hardening tracks: #1071 (OSV-advisory resolution
# on the existing manifests, opens PRs that dependabot would surface
# weekly in steady state), #1072 (Actions SHA-pinning + least-priv
# permissions blocks + PyPI OIDC), #1073 (`docs/security.md` baseline).

version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - go

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
