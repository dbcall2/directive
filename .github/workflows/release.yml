name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:  # manual trigger for smoke-testing without publishing

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # Freeze gate (#1972 / #1912): weigh a Go-installer release tag against the
  # pinned Tier-0 SoT. Runs ONCE in a dedicated job (not per build-matrix leg).
  # When the tag is ABOVE the frozen line the gate does NOT fail the workflow
  # (#1987); it emits frozen_skip=true and the build job (+ its downstream Go
  # jobs, via the needs chain) skip cleanly so the run stays green -- npm publish
  # (npm-publish.yml) is a separate workflow and ships regardless. The only
  # hard-fail left is an unparseable SoT (fail-loud, never fail-open). The real
  # installer version is ldflags-injected in the build job
  # (`-X main.version=${{ github.ref_name }}`), so the freeze line is the release
  # TAG vs the SoT -- not the stale `var version` source literal. Reads the
  # pinned value from sot.ts (no version hardcoded here); advisory while the SoT
  # is null (unfrozen).
  # -----------------------------------------------------------------------
  freeze-gate:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    # frozen_skip (#1987): "true" when the release tag is ABOVE the pinned SoT, so
    # the Go binary build + release-asset upload skip cleanly (green) instead of
    # hard-failing the workflow. Unset/empty on every other path (build runs).
    outputs:
      frozen_skip: ${{ steps.gate.outputs.frozen_skip }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Refuse a Go-installer release above the frozen SoT
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          # Only a v*.*.* tag push cuts a release; nothing to weigh otherwise
          # (e.g. a workflow_dispatch run on a branch).
          case "${GITHUB_REF:-}" in
            refs/tags/v*) : ;;
            *) echo "OK: not a release tag push (${GITHUB_REF:-unknown}); freeze gate is a no-op."; exit 0 ;;
          esac
          sot="packages/core/src/legacy-bridge/sot.ts"
          # Tier-0 SoT: a quoted frozen tag, or the literal `null` while unfrozen.
          pinned=$(sed -n 's/.*LAST_GO_INSTALLER[^=]*=[[:space:]]*"\([^"]*\)".*/\1/p' "$sot" | head -n1)
          if [ -z "$pinned" ]; then
            # Distinguish a genuine `= null` (advisory) from an unparseable
            # assignment (fail loud), so a reformat to a multi-line assignment
            # can never silently fail open into an advisory pass.
            if grep -Eq 'LAST_GO_INSTALLER[^=]*=[[:space:]]*null' "$sot"; then
              echo "OK (advisory): Go installer is not frozen (LAST_GO_INSTALLER is null); allowing build of ${GITHUB_REF_NAME}."
              exit 0
            fi
            echo "::error::Could not parse LAST_GO_INSTALLER from ${sot} (neither a quoted tag nor null on one line). Refusing to fail open -- check the SoT formatting."
            exit 1
          fi
          # Compare numeric major.minor.patch cores (strip a leading v and any
          # -/+ suffix), mirroring freeze-gate.ts compareInstallerVersions.
          core() { local v="${1#v}"; printf '%s' "${v%%[-+]*}"; }
          tag_core="$(core "${GITHUB_REF_NAME}")"
          pin_core="$(core "${pinned}")"
          highest="$(printf '%s\n%s\n' "$pin_core" "$tag_core" | sort -V | tail -n1)"
          if [ "$tag_core" != "$pin_core" ] && [ "$highest" = "$tag_core" ]; then
            # #1987: the Go installer is frozen (SoT pinned) and this tag is past
            # the line. Rather than hard-fail the whole Release workflow (a red X
            # on every post-freeze tag, even though npm still ships), skip the Go
            # binary build + release-asset upload cleanly. The build job gates on
            # this output via `if:`, and its downstream Go jobs skip via the needs
            # chain, so the run stays green.
            echo "::notice::release tag ${GITHUB_REF_NAME} is ABOVE the frozen Go-installer bridge tag ${pinned} (#1912/#1972). The Go installer is frozen; skipping the Go binary build + release-asset upload. npm publish (npm-publish.yml) is unaffected. To resume Go builds, roll the freeze SoT forward in sot.ts."
            echo "frozen_skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "OK: release tag ${GITHUB_REF_NAME} is at or below the frozen line (${pinned})."

  # -----------------------------------------------------------------------
  # Build all 6 platform targets
  # -----------------------------------------------------------------------
  build:
    needs: freeze-gate
    # #1987: skip the Go binary build (and, via the needs chain, every downstream
    # Go job incl. the release-asset upload) when the freeze gate flagged the tag
    # as above the frozen line. npm publish runs in a separate workflow regardless.
    if: ${{ needs.freeze-gate.outputs.frozen_skip != 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            artifact: install-windows-amd64.exe
          - goos: windows
            goarch: arm64
            artifact: install-windows-arm64.exe
          - goos: darwin
            goarch: amd64
            artifact: install-macos-amd64
          - goos: darwin
            goarch: arm64
            artifact: install-macos-arm64
          - goos: linux
            goarch: amd64
            artifact: install-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: install-linux-arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # Read the Go version from go.mod (single source of truth) so the
          # release pipeline stays in sync with the manifest -- closes the
          # #1071 follow-up that called out the prior hardcoded `1.22` string
          # as a drift hazard. setup-go v6 sets GOTOOLCHAIN=local by default,
          # which disables the go.mod `toolchain` directive's auto-upgrade
          # path; pinning from go.mod ensures the installed Go satisfies the
          # `go >= 1.25` minimum regardless of toolchain auto-fetch.
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: >
          go build
          -ldflags "-X main.version=${{ github.ref_name }} -X main.defaultBranch=${{ github.ref_name }}"
          -o ${{ matrix.artifact }}
          ./cmd/deft-install/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # -----------------------------------------------------------------------
  # Create macOS universal binary from the two darwin builds
  # -----------------------------------------------------------------------
  universal-macos:
    needs: build
    # Use GitHub-hosted macos-latest here -- blacksmith-6vcpu-macos-15 cannot reach
    # the GitHub Actions artifact API (ECONNREFUSED on actions/download-artifact@v4).
    # Other runners in this workflow stay on Blacksmith; only the macOS lipo step
    # falls back until the Blacksmith macOS runner networking is fixed.
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: install-macos-amd64
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: install-macos-arm64
      - name: Create universal binary
        run: lipo -create -output install-macos-universal install-macos-amd64 install-macos-arm64
      - name: Verify universal binary
        run: lipo -info install-macos-universal
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: install-macos-universal
          path: install-macos-universal

  # -----------------------------------------------------------------------
  # Smoke test — run --version on each native-runnable binary
  # -----------------------------------------------------------------------
  smoke-test:
    needs: [build, universal-macos]
    env:
      DEFT_NO_UPDATE_CHECK: "1"
    strategy:
      matrix:
        include:
          - artifact: install-windows-amd64.exe
            runner: windows-latest
            expected_os: windows
            expected_arch: amd64
          - artifact: install-linux-amd64
            runner: ubuntu-latest
            expected_os: linux
            expected_arch: amd64
          - artifact: install-linux-arm64
            runner: ubuntu-24.04-arm
            expected_os: linux
            expected_arch: arm64
          - artifact: install-macos-universal
            runner: macos-latest
            expected_os: darwin
            expected_arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ matrix.artifact }}
      - name: Make executable
        if: runner.os != 'Windows'
        run: chmod +x ${{ matrix.artifact }}
      - name: Smoke test --version
        run: ./${{ matrix.artifact }} --version
      - name: Verify --help output
        shell: bash
        run: |
          ./${{ matrix.artifact }} --help > help_output.txt 2>&1 || true
          grep -q "Usage:" help_output.txt
          grep -q "branch" help_output.txt
      - name: Verify platform detection
        shell: bash
        run: |
          echo "" | ./${{ matrix.artifact }} --debug > debug_output.txt 2>&1 || true
          grep -q "OS=${{ matrix.expected_os }}" debug_output.txt
          grep -q "ARCH=${{ matrix.expected_arch }}" debug_output.txt
      - name: Verify defaultBranch embedded at build time
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          echo "" | ./${{ matrix.artifact }} --debug > dbranch_output.txt 2>&1 || true
          grep -q "defaultBranch=${{ github.ref_name }}" dbranch_output.txt
      - name: Verify wizard starts
        shell: bash
        run: |
          echo "" | ./${{ matrix.artifact }} > wizard_output.txt 2>&1 || true
          grep -q "Welcome to Deft" wizard_output.txt
      - name: Verify --branch flag accepted
        shell: bash
        run: |
          echo "" | ./${{ matrix.artifact }} --branch beta > branch_output.txt 2>&1 || true
          grep -q "Welcome to Deft" branch_output.txt
      - name: Verify macOS universal architectures
        if: matrix.artifact == 'install-macos-universal'
        run: lipo -info install-macos-universal | grep -q "x86_64 arm64"

  # -----------------------------------------------------------------------
  # Build-time CI assertion: `run`'s resolved VERSION matches the pushed tag.
  #
  # Closes the regression loop for #741: prior to that fix the literal
  # `VERSION = "X.Y.Z"` in `run` could drift from the latest annotated tag
  # without anything failing fast. Now that `run` resolves the version
  # dynamically (env -> git describe -> 0.0.0-dev fallback), we still want
  # CI to fail fast on a tag push if the priority chain disagrees with the
  # tag we are about to release -- e.g. someone pushed a tag that does not
  # match the latest annotated tag visible to `git describe` at this SHA.
  # -----------------------------------------------------------------------
  verify-run-version:
    needs: smoke-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Need full tag history so `git describe --tags --abbrev=0`
          # resolves to the just-pushed annotated tag, not a shallow stub.
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Resolve version from `run` and compare to pushed tag
        shell: bash
        # Force-unset DEFT_RELEASE_VERSION so the env-override branch of
        # `_resolve_version()` cannot short-circuit the drift check. If a
        # future workflow step (or an org-/repo-level Actions variable)
        # populates the env var, the assertion would silently pass
        # against the override value rather than testing the
        # `git describe` branch this job is designed to exercise.
        # `env:` at the step level wins over inherited environment so
        # the assertion is self-enforcing regardless of CI configuration.
        env:
          DEFT_RELEASE_VERSION: ""
        run: |
          set -euo pipefail
          # Strip leading `v` from the pushed tag (e.g. v0.21.0 -> 0.21.0).
          tag="${GITHUB_REF_NAME#v}"
          # Mirror scripts/resolve_version.py priority chain by importing
          # `run` (the framework CLI) directly. The empty
          # DEFT_RELEASE_VERSION above falls through the env branch (the
          # resolver treats empty values as unset), exercising the
          # git-describe path so that drift surfaces here.
          resolved=$(python -c "import sys; sys.path.insert(0, '.'); from run import VERSION; print(VERSION)")
          echo "pushed tag (stripped): $tag"
          echo "resolved by run:       $resolved"
          if [ "$resolved" != "$tag" ]; then
            echo "::error::run-resolved VERSION ($resolved) does not match pushed tag ($tag) -- see #741"
            exit 1
          fi

  # -----------------------------------------------------------------------
  # Create / update the GitHub Release as a DRAFT and attach binaries.
  #
  # Per #716 / #733: this workflow MUST NOT auto-publish GitHub releases.
  # Publish authority for the GitHub release belongs to `task release:publish`
  # (which runs `gh release edit --draft=false` after draft QA). The
  # `softprops/action-gh-release@v2` step therefore sets `draft: true` --
  # this preserves the draft state created by `task release` (which uses
  # `gh release create --draft`) and never flips `isDraft: false` on its own.
  #
  # npm tag coupling (#1910 / #1972 / #2002): a `v*` tag push ALSO fires
  # `.github/workflows/npm-publish.yml` in a SEPARATE workflow that is NOT
  # draft-gated. npm packages ship irrevocably at tag push; the GitHub draft
  # gate above controls release visibility only, not npm publish authority.
  # -----------------------------------------------------------------------
  release:
    needs: [smoke-test, verify-run-version]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    # #1072 least-privilege: the top-level workflow permission is
    # `contents: read` (default-deny); this job uploads binaries to
    # the draft GitHub Release via softprops/action-gh-release and
    # therefore needs `contents: write` scoped to this job only.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true
      - name: Upload binaries to draft release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          # MUST be true -- see #733 / #716 above. Do NOT remove this key
          # or set it to false; `task release:publish` is the only path
          # authorised to flip draft -> public.
          draft: true
          # #425: flag SemVer pre-release tags (-rc.N / -beta.N / -alpha.N)
          # as GitHub pre-releases automatically. The hyphen is SemVer's
          # canonical pre-release marker, so `contains(github.ref_name, '-')`
          # catches every qualifier without a maintained suffix list. Mirrors
          # the tag-derived `--prerelease` flag in scripts/release.py so both
          # release-creation paths agree.
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/install-windows-amd64.exe
            artifacts/install-windows-arm64.exe
            artifacts/install-macos-universal
            artifacts/install-linux-amd64
            artifacts/install-linux-arm64
