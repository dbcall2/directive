name: npm publish

# Canonical v1 distribution channel for @deftai/directive* (#1670 Decision-4).
# pip/PyPI publish is explicitly out of scope for v1 — deferred to #1084.

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish @deftai/directive* to npm
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Node 24 LTS pinned via .nvmrc; registry-url wires NODE_AUTH_TOKEN for npm.
      # id-token: write (workflow permissions) enables --provenance attestations.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm -w run build

      - name: Align package versions with release tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Publishing npm packages at version ${VERSION}"
          for dir in packages/types packages/core packages/content packages/cli; do
            npm version "${VERSION}" --no-git-tag-version --allow-same-version --prefix "${dir}"
          done

      - name: Resolve workspace protocol for npm publish
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${VERSION#v}"
          node --input-type=commonjs -e "
            const fs = require('node:fs');
            const semver = '^' + process.env.VERSION;
            for (const path of ['packages/core/package.json', 'packages/cli/package.json']) {
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              if (pkg.dependencies) {
                for (const [name, ver] of Object.entries(pkg.dependencies)) {
                  if (typeof ver === 'string' && ver.startsWith('workspace:')) {
                    pkg.dependencies[name] = semver;
                  }
                }
              }
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
            }
          "

      # Dependency order: types -> core -> content -> cli
      - name: Publish @deftai/directive-types
        working-directory: packages/types
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @deftai/directive-core
        working-directory: packages/core
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @deftai/directive-content
        working-directory: packages/content
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @deftai/directive
        working-directory: packages/cli
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
